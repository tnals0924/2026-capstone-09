spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:flowmeet-bucket}
      region: ${S3_REGION:ap-northeast-2}
      cdn-url: ${S3_CDN_URL:}

google:
  meet:
    enabled: ${GOOGLE_MEET_ENABLED:false}
    application-name: ${GOOGLE_APP_NAME:FlowMeet}
    client-id: ${OAUTH2_GOOGLE_CLIENT_ID:}
    client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET:}
    calendar-id: ${GOOGLE_CALENDAR_ID:primary}
    timezone: ${GOOGLE_MEET_TIMEZONE:Asia/Seoul}

discord:
  error-notifier:
    enabled: ${DISCORD_ERROR_NOTIFIER_ENABLED:false}
    bot-token: ${DISCORD_BOT_TOKEN:}
    channel-id: ${DISCORD_ERROR_CHANNEL_ID:}
