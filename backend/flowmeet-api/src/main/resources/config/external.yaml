spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:flowmeet-bucket}
      region: ${S3_REGION:ap-northeast-2}
      cdn-url: ${S3_CDN_URL:}
