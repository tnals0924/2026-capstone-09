spring:
  application:
    name: flowmeet
  config:
    import:
      - classpath:config/domain.yaml
      - classpath:config/auth.yaml
      - classpath:config/external.yaml
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  shutdown: graceful

logging:
  level:
    root: INFO
    kr.flowmeet: DEBUG
