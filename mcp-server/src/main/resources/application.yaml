spring:
  ai:
    mcp:
      server:
        name: flowmeet-mcp-server
        version: 1.0.0
        type: SYNC
        protocol: STREAMABLE

server:
  port: 8082
  tomcat:
    threads:
      max: 400
      min-spare: 20
    accept-count: 200

backend:
  url: http://localhost:8080

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{requestId}] %-5level %logger{36} - %msg%n"